<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e5484d"/>
    </marker>
  </defs>

  <!-- background card (readable on GitHub light & dark) -->
  <rect x="0" y="0" width="960" height="620" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="959" height="619" rx="16" fill="none" stroke="#e2e8f0"/>

  <text x="480" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">Atlas — request pipeline</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#64748b">Ticket in → grounded resolution out. Every answer is routed, retrieved, and verified before it ships.</text>

  <!-- ===================== ENTRY POINTS ===================== -->
  <text x="70" y="100" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">ENTRY POINTS</text>
  <g font-size="12.5" fill="#334155">
    <rect x="60" y="112" width="150" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="135" y="133" text-anchor="middle" font-weight="600">Streamlit UI</text>
    <rect x="60" y="152" width="150" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="135" y="173" text-anchor="middle">MCP client / CLI</text>
    <rect x="60" y="192" width="150" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="135" y="213" text-anchor="middle">Eval harness</text>
  </g>
  <path d="M 212 169 L 258 169" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===================== AGENT CORE ===================== -->
  <rect x="262" y="82" width="440" height="300" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="482" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">run_agent() — async orchestration chain</text>

  <!-- classify -->
  <rect x="292" y="120" width="180" height="46" rx="9" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="382" y="140" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">classify_llm</text>
  <text x="382" y="156" text-anchor="middle" font-size="11" fill="#3b6ea5">route → KB · TOOL · BOTH</text>

  <!-- retrieve -->
  <rect x="292" y="182" width="180" height="46" rx="9" fill="#dcfce7" stroke="#4ade80"/>
  <text x="382" y="202" text-anchor="middle" font-size="12.5" font-weight="600" fill="#166534">build_context (RAG)</text>
  <text x="382" y="218" text-anchor="middle" font-size="11" fill="#3f8f5f">BM25 + Voyage → RRF fusion</text>

  <!-- generate -->
  <rect x="292" y="244" width="180" height="46" rx="9" fill="#fef9c3" stroke="#facc15"/>
  <text x="382" y="264" text-anchor="middle" font-size="12.5" font-weight="600" fill="#854d0e">generate_answer</text>
  <text x="382" y="280" text-anchor="middle" font-size="11" fill="#a06a12">Claude Haiku · tool loop · cache</text>

  <!-- verify -->
  <rect x="292" y="306" width="180" height="46" rx="9" fill="#f3e8ff" stroke="#c084fc"/>
  <text x="382" y="326" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b21a8">verify</text>
  <text x="382" y="342" text-anchor="middle" font-size="11" fill="#8b45c0">grounding gate → PASS / FAIL</text>

  <!-- vertical flow arrows -->
  <path d="M 382 167 L 382 181" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 382 229 L 382 243" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 382 291 L 382 305" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- retry loop (backward edge) -->
  <path d="M 472 329 C 540 329, 540 267, 472 267" fill="none" stroke="#e5484d" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrRed)"/>
  <text x="556" y="300" font-size="10.5" fill="#e5484d" font-weight="600">retry w/</text>
  <text x="556" y="313" font-size="10.5" fill="#e5484d" font-weight="600">reason (×2)</text>

  <!-- outcomes -->
  <rect x="512" y="120" width="164" height="42" rx="9" fill="#ecfdf5" stroke="#34d399"/>
  <text x="594" y="140" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">grounded answer</text>
  <text x="594" y="154" text-anchor="middle" font-size="10.5" fill="#3f8f77">+ signal badges</text>
  <path d="M 474 320 C 560 320, 560 175, 592 165" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="600" y="188" font-size="10.5" fill="#10b981" font-weight="600">PASS</text>

  <rect x="512" y="330" width="164" height="42" rx="9" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="594" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">safe fallback</text>
  <text x="594" y="364" text-anchor="middle" font-size="10.5" fill="#c05656">escalate to human</text>
  <text x="486" y="366" font-size="10.5" fill="#e5484d" font-weight="600">2× FAIL</text>

  <!-- ===================== MCP SERVER ===================== -->
  <path d="M 382 353 L 382 420" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="332" y="392" font-size="10.5" fill="#64748b">call_tool (stdio)</text>

  <rect x="262" y="424" width="440" height="150" rx="14" fill="#fff7ed" stroke="#fdba74"/>
  <text x="482" y="446" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">MCP server (FastMCP) — src.mcp_server</text>

  <rect x="284" y="460" width="130" height="96" rx="9" fill="#ffffff" stroke="#fdba74"/>
  <text x="349" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">Tools</text>
  <text x="349" y="500" text-anchor="middle" font-size="10.5" fill="#7c2d12">get_order_status</text>
  <text x="349" y="516" text-anchor="middle" font-size="10.5" fill="#7c2d12">get_customer_orders</text>

  <rect x="420" y="460" width="130" height="96" rx="9" fill="#ffffff" stroke="#fdba74"/>
  <text x="485" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">Resources</text>
  <text x="485" y="500" text-anchor="middle" font-size="10.5" fill="#7c2d12">kb:// articles</text>

  <rect x="556" y="460" width="124" height="96" rx="9" fill="#ffffff" stroke="#fdba74"/>
  <text x="618" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">Prompts</text>
  <text x="618" y="500" text-anchor="middle" font-size="10.5" fill="#7c2d12">order_status</text>
  <text x="618" y="516" text-anchor="middle" font-size="10.5" fill="#7c2d12">refund_inquiry</text>

  <!-- ===================== DATA LAYER ===================== -->
  <text x="760" y="100" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">DATA</text>
  <g font-size="11.5" fill="#334155">
    <rect x="752" y="112" width="176" height="30" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="840" y="131" text-anchor="middle">data/kb/*.md (articles)</text>
    <rect x="752" y="150" width="176" height="30" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="840" y="169" text-anchor="middle">vectors.json (Voyage)</text>
    <rect x="752" y="188" width="176" height="30" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="840" y="207" text-anchor="middle">orders.json</text>
    <rect x="752" y="226" width="176" height="30" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="840" y="245" text-anchor="middle">customers.json</text>
    <rect x="752" y="264" width="176" height="30" rx="7" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="840" y="283" text-anchor="middle">conversations/*.json</text>
  </g>
  <!-- RAG reads KB+vectors -->
  <path d="M 474 205 C 620 205, 640 150, 750 145" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <path d="M 474 210 C 640 240, 660 200, 750 200" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <!-- tools read orders/customers -->
  <path d="M 682 500 C 730 500, 730 250, 750 240" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arr)"/>

  <!-- footer note -->
  <text x="70" y="270" font-size="11" fill="#64748b">Multimodal:</text>
  <text x="70" y="286" font-size="11" fill="#94a3b8">image / PDF</text>
  <text x="70" y="300" font-size="11" fill="#94a3b8">→ base64 blocks</text>
  <path d="M 135 310 C 135 345, 250 300, 291 270" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arr)"/>

  <text x="480" y="600" text-anchor="middle" font-size="11" fill="#94a3b8">Hand-rolled chain shown. A LangGraph port (src/langgraph_agent.py) re-implements the same graph on LangChain transport.</text>
</svg>
